<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bliss Homestay — Boutique CRM Admin Panel</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/crm.css">
</head>
<body>
  <!-- Ambient Background Mesh Gradients -->
  <div class="ambient-glow bg-blob-1"></div>
  <div class="ambient-glow bg-blob-2"></div>
  <div class="ambient-glow bg-blob-3"></div>

  <!-- Main SPA Wrapper -->
  <div id="crm-app" class="crm-app-container hidden">
    <!-- Sidebar Navigation -->
    <aside class="crm-sidebar">
      <div class="sidebar-brand">
        <span class="brand-emoji">🏡</span>
        <div class="brand-text">
          <span class="brand-title">BLISS <span class="highlight">CRM</span></span>
          <span class="brand-subtitle">Homestay Hub v3.0</span>
        </div>
      </div>

      <nav class="sidebar-menu">
        <button class="nav-item active" data-view="dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-view="bookings" id="nav-bookings">
          <span class="nav-icon">📅</span>
          <span class="nav-label">Đặt Phòng</span>
        </button>
        <button class="nav-item" data-view="rooms" id="nav-rooms">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Quản Lý Phòng</span>
        </button>
        <button class="nav-item" data-view="customers" id="nav-customers">
          <span class="nav-icon">👑</span>
          <span class="nav-label">Khách Hàng VIP</span>
        </button>
        <button class="nav-item" data-view="chat" id="nav-chat">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chat Console</span>
          <span class="chat-badge-alert hidden" id="chat-alert-badge">0</span>
        </button>
        <button class="nav-item" data-view="settings" id="nav-settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Cấu Hình System</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar">👤</div>
          <div class="user-info">
            <span class="user-name" id="user-display-name">Admin</span>
            <span class="user-role">Quản trị viên</span>
          </div>
        </div>
        <button class="btn-logout" id="btn-logout-trigger">
          <span class="logout-icon">🚪</span> Đăng xuất
        </button>
      </div>
    </aside>

    <!-- Main Content Panel Area -->
    <main class="crm-main-viewport">
      <!-- Header Bar -->
      <header class="crm-header">
        <div class="header-breadcrumb">
          <span class="breadcrumb-parent">CRM</span>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current" id="header-view-title">Dashboard</span>
        </div>
        
        <div class="header-actions">
          <!-- Sync status pill -->
          <div class="sync-status-pill synced" id="sync-status-indicator">
            <span class="sync-dot"></span>
            <span class="sync-text" id="sync-status-text">Đồng bộ Google Sheets</span>
          </div>
          <!-- Clock -->
          <div class="header-clock" id="header-clock-display">23:59:59</div>
          <!-- Quick refresh button -->
          <button class="btn-icon" id="btn-global-refresh" title="Làm mới dữ liệu">🔄</button>
        </div>
      </header>

      <!-- View Containers (Single Page Application Content Switcher) -->
      <div class="crm-views-container">
        <!-- VIEW: DASHBOARD -->
        <section id="view-dashboard" class="crm-view active"></section>

        <!-- VIEW: BOOKINGS -->
        <section id="view-bookings" class="crm-view"></section>

        <!-- VIEW: ROOMS -->
        <section id="view-rooms" class="crm-view"></section>

        <!-- VIEW: CUSTOMERS -->
        <section id="view-customers" class="crm-view"></section>

        <!-- VIEW: CHAT CONSOLE -->
        <section id="view-chat" class="crm-view"></section>

        <!-- VIEW: SETTINGS -->
        <section id="view-settings" class="crm-view"></section>
      </div>
    </main>
  </div>

  <!-- AUTH / LOGIN MODAL (Fullscreen overlay when not authorized) -->
  <div id="crm-login-overlay" class="crm-login-overlay">
    <div class="glass-card login-card animate-fade-in">
      <div class="login-header">
        <span class="login-logo">🏡</span>
        <h2>BLISS HOMESTAY</h2>
        <p>Boutique CRM Administration</p>
      </div>

      <form id="crm-login-form">
        <div class="form-group">
          <label class="form-label" for="login-username">Tên đăng nhập</label>
          <div class="input-with-icon">
            <span class="input-icon">👤</span>
            <input type="text" id="login-username" class="form-input" placeholder="admin" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Mật khẩu</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <div class="login-error-message hidden" id="login-error-msg">
          ❌ Sai tài khoản hoặc mật khẩu!
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit">
          🔑 Đăng Nhập Hệ Thống
        </button>
      </form>
    </div>
  </div>

  <!-- GLOBAL DYNAMIC MODAL (For creation/editing rooms, bookings, etc.) -->
  <div id="crm-global-modal" class="modal-overlay hidden">
    <div class="glass-card modal-card animate-zoom-in">
      <div class="modal-header">
        <h3 id="modal-title">Tiêu Đề Modal</h3>
        <button class="modal-close-btn" id="modal-close-trigger">&times;</button>
      </div>
      <div class="modal-body" id="modal-body-content">
        <!-- Injected dynamically -->
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="js/crmApp.js"></script>
</body>
</html>
